name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Run Rust unit tests
        run: cargo test -p albert-core -p albert-parser -p albert-storage

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Build frontend workspace
        run: npm run build

      - name: Regenerate brand assets
        run: ./scripts/generate_brand_assets.sh

      - name: Assert generated assets are up to date
        run: git diff --exit-code -- assets/branding apps/desktop/public apps/desktop/src-tauri/icons
